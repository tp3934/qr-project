<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Generador de QR Mejorado</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        /* Tu diseño original */
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; transition: 0.3s; }
        body.dark-mode { background-color: #1a1a1a; color: white; }
        .section { margin-bottom: 20px; border: 1px solid #ccc; padding: 15px; border-radius: 5px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        textarea, select, button, input[type="file"] { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #4CAF50; color: white; border: none; cursor: pointer; font-size: 1.1em; }
        #qr-image { max-width: 300px; border: 1px solid #eee; display: none; margin-top: 20px; }
        .theme-btn { float: right; padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>
    <button class="theme-btn" id="theme-toggle">🌙 Modo Oscuro</button>
    <h1>Mi Generador de QR Mejorado</h1>

    <div class="section">
        <h2>Paso 1: Sube imagen con QR</h2>
        <input type="file" id="qr-input-image" accept="image/*">
    </div>

    <div class="section">
        <h2>Paso 2: Configura y Genera</h2>
        <form id="qr-generator-form">
            <label>Text content:</label>
            <textarea id="text-content" name="textContent" rows="6"></textarea>

            <label>Barcode size:</label>
            <select name="barcodeSize"><option value="Large">Large</option></select>

            <label>Error correction:</label>
            <select name="errorCorrection"><option value="H">H (30% correction)</option></select>

            <button type="submit">Generate →</button>
        </form>
    </div>

    <div id="qr-result" style="text-align: center;">
        <img id="qr-image" alt="QR Generado">
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
