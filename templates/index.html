<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador QR Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root { --bg: #ffffff; --text: #333; --sec: #f4f4f4; --accent: #4CAF50; }
        body.dark-mode { --bg: #1a1a1a; --text: #fff; --sec: #2d2d2d; }
        
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; transition: 0.3s; max-width: 500px; margin: 0 auto; }
        .section { background-color: var(--sec); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        textarea, button, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; margin-top: 10px; box-sizing: border-box; }
        button { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; }
        .theme-switch { position: fixed; top: 20px; right: 20px; padding: 8px; width: auto; border: 1px solid var(--accent); background: none; color: var(--accent); }
        #qr-image { width: 100%; display: none; margin-top: 20px; border-radius: 8px; }
        .loading { color: var(--accent); display: none; text-align: center; }
    </style>
</head>
<body>
    <button class="theme-switch" id="theme-toggle">🌙 Modo Oscuro</button>
    <h1>QR Pro Scanner & Gen</h1>

    <div class="section">
        <label>Subir imagen para escanear:</label>
        <input type="file" id="qr-input-image" accept="image/*">
        <p class="loading" id="scan-loading">Escaneando...</p>
    </div>

    <div class="section">
        <label>Contenido para nuevo QR:</label>
        <textarea id="text-content" rows="4" placeholder="Texto o enlace aquí..."></textarea>
        <button id="btn-generate">Generar con mi Logo</button>
    </div>

    <img id="qr-image" alt="QR Generado">

    <script src="/static/script.js"></script>
</body>
</html>
